btc_project_profile:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres_password') }}"
      port: {{ env_var('POSTGRES_PORT', '5432') | int }}
      dbname: "{{ env_var('POSTGRES_DB', 'btc_pipeline') }}"
      schema: public
      threads: 4
      keepalives_idle: 0
